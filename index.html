<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Geodata | Demo | AI Assistant component (beta)</title>
    <link rel="icon" type="image/png" href="./images/geodata-16x16.png" sizes="16x16">
    <link rel="icon" type="image/png" href="./images/geodata-32x32.png" sizes="32x32">
    <link rel="icon" type="image/png" href="./images/geodata-96x96.png" sizes="96x96">
    
    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>
  </head>
  <body>
    <calcite-shell>
      <calcite-navigation slot="header">
        <calcite-navigation-logo slot="logo"></calcite-navigation-logo>
        <calcite-navigation-user slot="user"></calcite-navigation-user>
      </calcite-navigation>
      <!--arcgis-map id="pos-map" item-id="c7211610818e4f7d93bf5b1976e13f63"-->
      <arcgis-map id="pos-map" item-id="506e32b63d2a44debfa341be97fe4840">
        <arcgis-zoom slot="top-left"></arcgis-zoom>
        <arcgis-expand slot="top-left">
          <arcgis-legend></arcgis-legend>
        </arcgis-expand>
      </arcgis-map>
      <calcite-shell-panel slot="panel-end" width="l" id="assistant-panel">
        <calcite-panel>
          <arcgis-assistant
            log-enabled
            copy-enabled
            reference-element="#pos-map"
            heading="Petroleum Online Services Assistant"
            description="Explore cultural data for the Norwegian Continental Shelf with the help of our assistant."
            entry-message="Hello! I'm here to help you explore cultural data for the Norwegian Continental Shelf.">
            <arcgis-assistant-navigation-agent></arcgis-assistant-navigation-agent>
            <arcgis-assistant-data-exploration-agent></arcgis-assistant-data-exploration-agent>
            <arcgis-assistant-help-agent></arcgis-assistant-help-agent>
          </arcgis-assistant>
        </calcite-panel>
      </calcite-shell-panel>
    </calcite-shell>
  </body>
  <script type="module" src="js/main.js"></script>
</html>
